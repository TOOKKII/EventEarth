<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un évènement - Mon Site</title>
</head>
<body>

    <header>
        <a href="Accueil.html">
            <img src="img/logo.webp" alt="Mon logo" width="100">
        </a>
        <nav>
            <ul>
                <li><a href="Accueil.html">L'accueil</a></li>
                <li><a href="Evenement.html">Les évènements</a></li>
                <li><a href="Contact.html">Nous contacter</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <main>
        <h1>Ajouter un nouvel évènement</h1>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <p>
                <label for="titre">Titre de l'évènement :</label><br>
                <input type="text" id="titre" name="titre" required>
            </p>

            <p>
                <label for="description">Description de l'évènement :</label><br>
                <textarea id="description" name="description" rows="5" cols="33" required></textarea>
            </p>

            <p>
                <label for="photo">Photo de l'évènement (fichier) :</label><br>
                <input type="file" id="photo" name="photo" accept="image/*">
            </p>

            <p>
                <label for="prix">Prix de l'évènement (en €) :</label><br>
                <input type="number" id="prix" name="prix" min="0" step="0.01" placeholder="0 pour gratuit">
            </p>

            <p>
                <button type="submit">Créer l'évènement</button>
            </p>

        </form>
    </main>

    <hr>

    <footer>
        <p>
            <a href="#">Mentions légales</a> | 
            <a href="#">Conditions générales d'utilisation</a>
        </p>
    </footer>

</body>
</html>
